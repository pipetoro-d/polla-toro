// в”Җв”Җв”Җ Puntos por categorГӯa + bono por clasificado (penales) в”Җв”Җв”Җ
function calcPts(p, m) {
  const h = p.h,
    a = p.a,
    gh = m.gh,
    ga = m.ga;
  let pts = 0,
    cat = 'participacion';
  if (h === gh && a === ga) {
    pts = 10;
    cat = 'exacto';
  } else {
    const pd = h - a,
      ad = gh - ga;
    const predDraw = pd === 0,
      actDraw = ad === 0;
    const rightWinner = pd > 0 && ad > 0 || pd < 0 && ad < 0;
    if (predDraw && actDraw) {
      pts = 5;
      cat = 'empate';
    } else if (rightWinner && pd === ad) {
      pts = 5;
      cat = 'diferencia';
    } else if (rightWinner) {
      pts = 3;
      cat = 'ganador';
    } else {
      pts = 1;
      cat = 'participacion';
    }
  }
  // Bono clasificado: si el partido fue a penales y el usuario predijo empate y acertГі quiГ©n pasГі
  let bonus = 0;
  if (m.penales && m.winner && p.adv && p.adv === m.winner) {
    bonus = 2;
  }
  return {
    pts: pts + bonus,
    base: pts,
    bonus,
    cat
  };
}
function calcScores(matches, preds) {
  const totals = {},
    byMatch = {};
  for (const m of matches) {
    if (!m.done || m.gh == null) continue;
    const mp = preds.filter(p => p.mid === m.id);
    const res = mp.map(p => {
      const r = calcPts(p, m);
      totals[p.uid] = (totals[p.uid] || 0) + r.pts;
      return {
        uid: p.uid,
        pts: r.pts,
        base: r.base,
        bonus: r.bonus,
        cat: r.cat,
        exact: r.cat === 'exacto'
      };
    }).sort((a, b) => b.pts - a.pts);
    byMatch[m.id] = res;
  }
  return {
    totals,
    byMatch
  };
}
// Desempate: exactos > aciertos de 5 > aciertos de 3 > alfabГ©tico
function catCounts(byMatch) {
  const cc = {};
  Object.values(byMatch).forEach(res => res.forEach(r => {
    if (!cc[r.uid]) cc[r.uid] = {
      ex: 0,
      five: 0,
      three: 0
    };
    if (r.cat === 'exacto') cc[r.uid].ex++;else if (r.cat === 'empate' || r.cat === 'diferencia') cc[r.uid].five++;else if (r.cat === 'ganador') cc[r.uid].three++;
  }));
  return cc;
}
function buildRanked(users, totals, byMatch) {
  const cc = catCounts(byMatch || {});
  const ranked = [...users].map(u => {
    const k = cc[u.id] || {
      ex: 0,
      five: 0,
      three: 0
    };
    return {
      ...u,
      pts: totals[u.id] || 0,
      ex: k.ex,
      five: k.five,
      three: k.three
    };
  }).sort((a, b) => b.pts - a.pts || b.ex - a.ex || b.five - a.five || b.three - a.three || a.name.localeCompare(b.name));
  let pos = 0,
    prevKey = null;
  ranked.forEach((u, i) => {
    const key = u.pts + '|' + u.ex + '|' + u.five + '|' + u.three;
    if (key !== prevKey) {
      pos = i + 1;
      prevKey = key;
    }
    u.pos = pos;
  });
  return ranked;
}

function advancer(m) {
  if (!m.done || m.gh == null) return null;
  if (m.gh > m.ga) return m.home;
  if (m.ga > m.gh) return m.away;
  return m.winner || null; // empate => definido por penales
}

function cardCanvas(h) {
  const cv = document.createElement('canvas');
  cv.width = 1000;
  cv.height = h;
  const x = cv.getContext('2d');
  x.fillStyle = '#04091a';
  x.fillRect(0, 0, 1000, h);
  const rg = x.createRadialGradient(500, -60, 60, 500, -60, 520);
  rg.addColorStop(0, 'rgba(255,216,77,.28)');
  rg.addColorStop(1, 'rgba(255,216,77,0)');
  x.fillStyle = rg;
  x.fillRect(0, 0, 1000, 440);
  const g = x.createLinearGradient(0, 0, 1000, 0);
  g.addColorStop(0, '#2b6cff');
  g.addColorStop(.5, '#FFD84D');
  g.addColorStop(1, '#ff4d5e');
  x.fillStyle = g;
  x.fillRect(0, 0, 1000, 12);
  x.fillRect(0, h - 12, 1000, 12);
  return [cv, x];
}
