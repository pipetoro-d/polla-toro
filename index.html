function calcScores(matches,preds){
  const totals={},byMatch={};
  for(const m of matches){
    if(!m.done||m.gh==null)continue;
    const mp=preds.filter(p=>p.mid===m.id);
    const ranked=mp.map(p=>({...p,dist:Math.abs(p.h-m.gh)+Math.abs(p.a-m.ga),exact:p.h===m.gh&&p.a===m.ga})).sort((a,b)=>a.dist-b.dist);
    let rank=0,prev=-1,res=[];
    for(const p of ranked){if(p.dist!==prev){rank++;prev=p.dist;}if(rank>5)continue;const pts=PTS[rank-1]+(p.exact?EXTRA:0);res.push({uid:p.uid,pts,rank,dist:p.dist,exact:p.exact});totals[p.uid]=(totals[p.uid]||0)+pts;}
    byMatch[m.id]=res;
  }
  return{totals,byMatch};
}

function Stepper({label,value,onChange}){
  return(
    <div>
      <div className="sclab">{label}</div>
      <div className="steprow">
        <button className="stepbtn" onClick={()=>onChange(Math.max(0,value-1))}>−</button>
        <div className="stepval">{value}</div>
        <button className="stepbtn" onClick={()=>onChange(Math.min(20,value+1))}>+</button>
      </div>
    </div>
  );
}

function Countdown({matches}){
  const[cd,setCd]=useState('');
  const next=[...matches].filter(m=>!m.done&&!m.live&&isSur(m)).sort((a,b)=>new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00')))[0];
  useEffect(()=>{
    if(!next){setCd('');return;}
    const tick=()=>{
      const diff=new Date(next.date+'T'+(next.time||'00:00')+':00')-new Date();
      if(diff<=0){setCd('¡Ahora!');return;}
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
      setCd(d>0?`${d}d ${h}h ${m}m`:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    };
    tick();const t=setInterval(tick,1000);return()=>clearInterval(t);
  },[next?.id]);
  if(!next||!cd)return null;
  return(
    <div className="cd-box">
      <div>
        <div className="cd-lbl">Próximo partido</div>
        <div className="cd-match">{FLAGS[next.home]||'🏳️'} {next.home} vs {next.away} {FLAGS[next.away]||'🏳️'}</div>
        <div style={{fontSize:10,color:'var(--mut)',marginTop:2}}>{next.date} · {next.time} COL</div>
      </div>
      <div style={{textAlign:'right'}}>
        <div className="cd-lbl">Faltan</div>
        <div className="cd-val">{cd}</div>
      </div>
    </div>
  );
}

function MatchCard({match,userPred,onClick}){
  const f=t=>FLAGS[t]||'🏳️';
  const cls=match.done?'bf':match.live?'bl':'bp';
  const lbl=match.done?'✅ Final':match.live?'🔴 En Vivo':'⏳ Próximo';
  return(
    <div className="card cclick" onClick={onClick}>
      <div className="trow">
        <div className="team"><span className="tf">{f(match.home)}</span><span className="tn">{match.home}</span></div>
        <div className="sc">
          {match.done?<div className="scn">{match.gh}–{match.ga}</div>:<div className="scv">VS</div>}
          {match.group&&<div style={{marginTop:4}}><span className="gbadge">Grupo {match.group}</span></div>}
        </div>
        <div className="team"><span className="tf">{f(match.away)}</span><span className="tn">{match.away}</span></div>
      </div>
      <div className="meta">
        <span className={`badge ${cls}`}>{lbl}</span>
        <span>{match.date}{match.time?` · ${match.time} COL`:''}</span>
        {userPred&&<span className="ptag">{userPred.h}–{userPred.a}</span>}
      </div>
    </div>
  );
}

function MatchesView({matches,preds,user,byMatch,config,onSelect}){
  const[filter,setFilter]=useState('todos');
  const sorted=[...matches].filter(isSur).sort((a,b)=>new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00')));
  const myMids=new Set(preds.filter(p=>p.uid===user.id).map(p=>p.mid));
  const list=filter==='mios'?sorted.filter(m=>myMids.has(m.id)):sorted;
  const live=list.filter(m=>m.live);
  const up=list.filter(m=>!m.done&&!m.live);
  const done=list.filter(m=>m.done);
  const sec=(title,arr)=>arr.length>0&&(<div key={title}><div className="stit">{title}</div>{arr.map(m=><MatchCard key={m.id} match={m} userPred={preds.find(p=>p.mid===m.id&&p.uid===user.id)} onClick={()=>onSelect(m)}/>)}</div>);
  return(
    <div>
      {!config.open&&<div className="ntf ntf-close">🔒 Las predicciones están cerradas.</div>}
      <Countdown matches={matches}/>
      <div className="frow">
        <button className={`fbtn ${filter==='todos'?'on':''}`} onClick={()=>setFilter('todos')}>⚽ Todos los partidos</button>
        <button className={`fbtn ${filter==='mios'?'on':''}`} onClick={()=>setFilter('mios')}>🎯 Solo mis predicciones</button>
      </div>
      {list.length===0
        ?<div className="empty"><div className="eico">{filter==='mios'?'🎯':'📅'}</div><div className="etxt">{filter==='mios'?'Aún no tienes predicciones.\nEntra a un partido y predice.':'Los partidos aparecerán aquí.'}</div></div>
        :<>{sec('🔴 EN VIVO',live)}{sec('⚽ PRÓXIMOS',up)}{sec('✅ FINALIZADOS',done)}</>
      }
    </div>
  );
}

function PredictView({match,user,preds,byMatch,users,config,onSave,onBack}){

              <Stepper label={match.home} value={home} onChange={setHome}/>

            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:'var(--gld)'}}>{ex.h} – {ex.a}</div>

  const[nm,setNm]=useState({home:'Colombia',away:'Argentina',date:new Date().toISOString().slice(0,10),time:'12:00',group:'TEST'});
  const[res,setRes]=useState({});
  const addMatch=async()=>{
    if(!nm.home||!nm.away||!nm.date)return;
    await onSaveMatch([...matches,{id:Date.now().toString(),...nm,done:false,live:false,gh:null,ga:null}]);
    showToast('Partido agregado ✅');
  };
  const addTest=async()=>{
    const t={id:'test-'+Date.now(),home:'Colombia',away:'Argentina',date:new Date().toISOString().slice(0,10),time:'12:00',group:'TEST',done:false,live:false,gh:null,ga:null};
    await onSaveMatch([...matches,t]);showToast('🧪 Partido de prueba agregado');
  };
  const saveResult=async mid=>{
    const r=res[mid];
    if(r?.gh===''||r?.ga===''||r?.gh==null||r?.ga==null)return;

  return(
    <div>
      <div className="stit">PANEL ADMIN 👑</div>
      <div className="asec">
        <div className="asect">Predicciones</div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:13}}>{config.open?'✅ Abiertas':'🔒 Cerradas'}</span>

        <div className="asect">Partido de Prueba</div>
        <button className="btn bts" onClick={addTest}>🧪 Agregar Colombia vs Argentina (hoy)</button>

        <div className="asect">Reiniciar Datos de Prueba</div>

        <button className="btn btd" onClick={async()=>{
          if(window.confirm('¿Borrar TODAS las predicciones? Los puntos volverán a cero.')){
            await onResetPreds();
            showToast('✅ Predicciones borradas. Puntajes en cero.');
          }
        }}>🗑️ Borrar todas las predicciones</button>
      </div>
      <div className="asec">
        <div className="asect">Agregar Partido</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div className="fg"><label className="lbl">Local</label><select className="inp" value={nm.home} onChange={e=>setNm({...nm,home:e.target.value})}>{TEAMS.map(t=><option key={t}>{t}</option>)}</select></div>
          <div className="fg"><label className="lbl">Visitante</label><select className="inp" value={nm.away} onChange={e=>setNm({...nm,away:e.target.value})}>{TEAMS.map(t=><option key={t}>{t}</option>)}</select></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px',gap:8}}>
          <div className="fg"><label className="lbl">Fecha</label><input className="inp" type="date" value={nm.date} onChange={e=>setNm({...nm,date:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Hora COL</label><input className="inp" type="time" value={nm.time} onChange={e=>setNm({...nm,time:e.target.value})}/></div>

        <button className="btn btp" onClick={addMatch}>+ Agregar partido</button>
      </div>
      {matches.length>0&&(
        <div className="asec">
          <div className="asect">Resultados ({matches.length})</div>

                  <input type="number" min={0} max={20} className="sminp" placeholder="L" value={res[m.id]?.gh??''} onChange={e=>setRes({...res,[m.id]:{...res[m.id],gh:e.target.value}})}/>
                  <span>–</span>

      {users.length>0&&(
        <div className="asec">
          <div className="asect">Participantes ({users.length})</div>
          {users.map(u=>(
            <div key={u.id} className="arow">
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{u.name}</div></div>
              <button className="btn btd btsm" style={{padding:'4px 10px'}} onClick={()=>onDeleteUser(u.id)}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const showToast=(msg,dur=2800)=>{setToast(msg);setTimeout(()=>setToast(null),dur);};

  useEffect(()=>{
    try{localStorage.setItem('pt26theme',theme);}catch{}
    document.body.style.background=theme==='light'?'#f0f4f8':'#060e1c';
  },[theme]);

  useEffect(()=>{
    const ref=fdb.ref('pt26');
    const handler=snap=>{
      const val=snap.val()||{};
      setData({
        users:  val.users   ?JSON.parse(val.users)  :[],
        matches:val.matches ?JSON.parse(val.matches) :[],
        preds:  val.preds   ?JSON.parse(val.preds)   :[],
        config: val.config  ?JSON.parse(val.config)  :{open:true}
      });
      setLoading(false);
    };
    ref.on('value',handler);
    return()=>ref.off('value',handler);
  },[]);

  useEffect(()=>{
    if(prevOpen.current!==null&&prevOpen.current!==data.config.open&&userRef.current){
      showToast(data.config.open?'✅ ¡Las predicciones están abiertas!':'🔒 Las predicciones se han cerrado.',4000);
    }
    prevOpen.current=data.config.open;
  },[data.config.open]);

  const save=async(key,val)=>{await dbSet(key,val);};
  const{totals,byMatch}=calcScores(data.matches,data.preds);

  const navs=[
    {id:'matches',ico:'⚽',lbl:'Partidos'},
    {id:'ranking',ico:'🏆',lbl:'Ranking'},
    {id:'porpartido',ico:'📊',lbl:'Por Partido'},

    ...(isAdmin?[{id:'admin',ico:'⚙️',lbl:'Admin'}]:[]),
  ];
  const goTo=v=>{setView(v);setSelMatch(null);};
  const CSS=(theme==='light'?LIGHT_CSS:DARK_CSS)+SHARED_CSS;

  if(loading)return(
    <>
      <style dangerouslySetInnerHTML={{__html:CSS}}/>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
        <div style={{fontSize:56,animation:'bounce 1.2s infinite'}}>⚽</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:'#FCD116',letterSpacing:2}}>Conectando...</div>
      </div>
    </>
  );

  return(
    <>
      <style dangerouslySetInnerHTML={{__html:CSS}}/>
      <div className="wrap">
        {user&&(
          <>
            <div className="hdr">
              <div>
                <div className="hdr-t">⚽ Polla Familiar 2026</div>
                <div className="hdr-s">La tradición de la familia Toro</div>
              </div>
              <div className="hdr-r">
                <button className="thmbtn" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>{theme==='dark'?'☀️':'🌙'}</button>
                <button className="ubub" onClick={()=>{setUser(null);userRef.current=null;setIsAdmin(false);setView('login');}}>{user.name.split(' ')[0]}</button>
              </div>
              <div className="hdr-bar"/>
            </div>
            <nav className="nav">
              {navs.map(n=>(
                <button key={n.id} className={`ni ${(view===n.id||(view==='predict'&&n.id==='matches'))?'on':''}`} onClick={()=>goTo(n.id)}>
                  <span className="nico">{n.ico}</span>{n.lbl}
                </button>
              ))}
            </nav>
          </>
        )}
        <div className="pg">
          {view==='login'&&(
            <LoginView users={data.users}
              onLogin={u=>{setUser(u);userRef.current=u;setView('matches');}}
              onRegister={async name=>{
                const nu={id:Date.now().toString(),name,apuesta:20000};
                await save('users',[...data.users,nu]);
                setUser(nu);userRef.current=nu;setView('matches');
                showToast('¡Bienvenido/a '+name+'! 🎉');
              }}
              onAdminLogin={pass=>{
                if(pass===ADMIN_PASS){const u={id:'admin',name:'Albeiro 👑',apuesta:0};setUser(u);userRef.current=u;setIsAdmin(true);setView('admin');showToast('¡Bienvenido Albeiro! 👑');}
                else showToast('❌ Contraseña incorrecta');
              }}
            />
          )}
          {(view==='matches'||(view==='predict'&&!selMatch))&&(
            <MatchesView matches={data.matches} preds={data.preds} user={user} byMatch={byMatch} config={data.config} onSelect={m=>{setSelMatch(m);setView('predict');}}/>
          )}
          {view==='predict'&&selMatch&&(
            <PredictView match={selMatch} user={user} preds={data.preds} byMatch={byMatch} users={data.users} config={data.config}
              onSave={async(h,a)=>{
                const now=Date.now();
                const ex=data.preds.find(p=>p.mid===selMatch.id&&p.uid===user.id);
                let np;
                if(ex){const hist=[...(ex.history||[]),{h:ex.h,a:ex.a,ts:now}];np=data.preds.map(p=>p.mid===selMatch.id&&p.uid===user.id?{...p,h,a,history:hist}:p);}
                else{np=[...data.preds,{id:Date.now().toString(),mid:selMatch.id,uid:user.id,h,a,history:[]}];}
                await save('preds',np);showToast('¡Predicción guardada! 🎯');setSelMatch(null);setView('matches');
              }}
              onBack={()=>{setSelMatch(null);setView('matches');}}
            />
          )}
          {view==='ranking'&&<RankingView users={data.users} totals={totals} user={user} matches={data.matches}/>}
          {view==='porpartido'&&<PorPartidoView matches={data.matches} preds={data.preds} users={data.users} byMatch={byMatch} user={user}/>}
          {view==='admin'&&isAdmin&&(
            <AdminView matches={data.matches} users={data.users} config={data.config} preds={data.preds}
              onSaveMatch={v=>save('matches',v)} onSaveConfig={v=>save('config',v)}
              onDeleteUser={async uid=>{await save('users',data.users.filter(u=>u.id!==uid));await save('preds',data.preds.filter(p=>p.uid!==uid));showToast('Participante eliminado');}}
              onResetPreds={async()=>save('preds',[])}
              showToast={showToast}
            />
          )}
        </div>
        {toast&&<div className="toast">{toast}</div>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
