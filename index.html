function calcScores(matches,preds){
  const totals={},byMatch={};
  for(const m of matches){
    if(!m.done||m.gh==null)continue;
    const mp=preds.filter(p=>p.mid===m.id);
    const ranked=mp.map(p=>({...p,dist:Math.abs(p.h-m.gh)+Math.abs(p.a-m.ga),exact:p.h===m.gh&&p.a===m.ga})).sort((a,b)=>a.dist-b.dist);
    let rank=0,prev=-1,res=[];
    for(const p of ranked){
      if(p.dist!==prev){rank++;prev=p.dist;}
      if(rank>PTS.length)continue;
      res.push({uid:p.uid,pts:PTS[rank-1],rank,dist:p.dist,exact:p.exact});
      totals[p.uid]=(totals[p.uid]||0)+PTS[rank-1];
    }
    byMatch[m.id]=res;
  }
  return{totals,byMatch};
}

function Stepper({label,value,onChange}){
  return(
    <div>
      <div className="sclab">{label}</div>
      <div className="steprow">
        <button className="stepbtn" onClick={()=>onChange(Math.max(0,value-1))}>−</button>
        <div className="stepval">{value}</div>
        <button className="stepbtn" onClick={()=>onChange(Math.min(20,value+1))}>+</button>
      </div>
    </div>
  );
}

function Countdown({matches}){
  const[cd,setCd]=useState('');
  const next=[...matches].filter(m=>!m.done&&!m.live&&!hasStarted(m)&&isSur(m)).sort((a,b)=>new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00')))[0];
  useEffect(()=>{
    if(!next){setCd('');return;}
    const tick=()=>{
      const diff=new Date(next.date+'T'+(next.time||'00:00')+':00')-new Date();
      if(diff<=0){setCd('¡Ya!');return;}
      const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
      setCd(d>0?`${d}d ${h}h ${m}m`:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    };
    tick();const t=setInterval(tick,1000);return()=>clearInterval(t);
  },[next?.id]);
  if(!next||!cd)return null;
  return(
    <div className="cd-box">
      <div>
        <div className="cd-lbl">Próximo partido</div>
        <div style={{fontSize:11,fontWeight:600}}>{FLAGS[next.home]||'🏳️'} {next.home} vs {next.away} {FLAGS[next.away]||'🏳️'}</div>
        <div style={{fontSize:10,color:'var(--mut)',marginTop:2}}>{next.date} · {next.time} COL</div>
      </div>
      <div style={{textAlign:'right'}}>
        <div className="cd-lbl">Faltan</div>
        <div className="cd-val">{cd}</div>
      </div>
    </div>
  );
}

function MatchCard({match,userPred,onClick}){
  const f=t=>FLAGS[t]||'🏳️';
  const started=hasStarted(match)&&!match.done&&!match.live;
  const cls=match.done?'bf':match.live?'bl':started?'bk':'bp';
  const lbl=match.done?'✅ Final':match.live?'🔴 En Vivo':started?'🔒 Iniciado':'⏳ Próximo';
  return(
    <div className="card cclick" onClick={onClick}>
      <div className="trow">
        <div className="team"><span className="tf">{f(match.home)}</span><span className="tn">{match.home}</span></div>
        <div className="sc">
          {match.done?<div className="scn">{match.gh}–{match.ga}</div>:<div className="scv">VS</div>}
          {match.group&&<div style={{marginTop:4}}><span className="gbadge">Grupo {match.group}</span></div>}
        </div>
        <div className="team"><span className="tf">{f(match.away)}</span><span className="tn">{match.away}</span></div>
      </div>
      <div className="meta">
        <span className={`badge ${cls}`}>{lbl}</span>
        <span>{match.date}{match.time?` · ${match.time} COL`:''}</span>
        {userPred&&<span className="ptag">{userPred.h}–{userPred.a}</span>}
      </div>
    </div>
  );
}

function MatchesView({matches,preds,user,config,onSelect}){
  const[filter,setFilter]=useState('todos');
  const sur=[...matches].filter(isSur).sort((a,b)=>new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00')));
  const myMids=new Set(preds.filter(p=>p.uid===user.id).map(p=>p.mid));
  const list=filter==='mios'?sur.filter(m=>myMids.has(m.id)):sur;
  const live=list.filter(m=>!m.done&&(m.live||hasStarted(m)));
  const up=list.filter(m=>!m.done&&!m.live&&!hasStarted(m));
  const done=list.filter(m=>m.done);
  const sec=(title,arr)=>arr.length>0&&(<div key={title}><div className="stit">{title}</div>{arr.map(m=><MatchCard key={m.id} match={m} userPred={preds.find(p=>p.mid===m.id&&p.uid===user.id)} onClick={()=>onSelect(m)}/>)}</div>);
  return(
    <div>
      {!config.open&&<div className="ntf-close">🔒 Las predicciones están cerradas.</div>}
      <Countdown matches={matches}/>
      <div className="frow">
        <button className={`fbtn ${filter==='todos'?'on':''}`} onClick={()=>setFilter('todos')}>⚽ Todos</button>
        <button className={`fbtn ${filter==='mios'?'on':''}`} onClick={()=>setFilter('mios')}>🎯 Mis predicciones</button>
      </div>
      {list.length===0?<div className="empty"><div className="eico">{filter==='mios'?'🎯':'📅'}</div><div className="etxt">{filter==='mios'?'Aún no tienes predicciones.':'Los partidos aparecerán aquí.'}</div></div>
        :<>{sec('🔴 EN JUEGO',live)}{sec('⚽ PRÓXIMOS',up)}{sec('✅ FINALIZADOS',done)}</>
      }
    </div>
  );
}

function PredictView({match,user,preds,byMatch,users,config,onSavePred,onBack}){
  const ex=preds.find(p=>p.mid===match.id&&p.uid===user.id);
  const[home,setHome]=useState(ex?.h??0);
  const[away,setAway]=useState(ex?.a??0);
  const started=hasStarted(match);

  const f=t=>FLAGS[t]||'🏳️';
  const res=byMatch[match.id]||[];
  const getU=uid=>users.find(u=>u.id===uid)||{name:'?',avatar:'⚽'};
  const matchPreds=preds.filter(p=>p.mid===match.id);
  const revealed=started||match.live||match.done;
  const unscored=matchPreds.filter(p=>!res.map(r=>r.uid).includes(p.uid));
  return(
    <div>
      <button className="btn bts btsm" style={{marginBottom:14}} onClick={onBack}>← Volver</button>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          {match.group?<span className="gbadge">Grupo {match.group}</span>:<span/>}
          <span style={{fontSize:11,color:'var(--mut)'}}>{match.date}{match.time?` · ${match.time} COL`:''}</span>
        </div>
        <div className="trow" style={{marginBottom:12}}>
          <div className="team"><span className="tf">{f(match.home)}</span><span className="tn">{match.home}</span></div>
          <div className="sc">
            {match.done?<div className="scn">{match.gh}–{match.ga}</div>:<div className="scv">VS</div>}
            {match.done&&<span className="badge bf" style={{fontSize:9,marginTop:4,display:'block'}}>FINAL</span>}
            {!match.done&&(match.live||started)&&<span className="badge bl" style={{fontSize:9,marginTop:4,display:'block'}}>EN JUEGO</span>}
          </div>
          <div className="team"><span className="tf">{f(match.away)}</span><span className="tn">{match.away}</span></div>
        </div>
        {canPredict?(
          <>
            <div className="divl"/>
            <div style={{textAlign:'center',fontSize:12,color:'var(--mut)',marginBottom:14}}>{ex?'¿Cambias tu predicción?':'¿Cuál es tu marcador?'}</div>
            <div style={{display:'flex',justifyContent:'space-around',gap:8,marginBottom:18}}>
              <Stepper label={match.home} value={home} onChange={setHome}/>
              <div style={{display:'flex',alignItems:'flex-end',paddingBottom:14}}><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:'var(--mut)'}}>–</span></div>
              <Stepper label={match.away} value={away} onChange={setAway}/>
            </div>
            <button className="btn btp" onClick={()=>onSavePred(home,away)}>{ex?'Actualizar 🔄':'¡Guardar predicción! 🎯'}</button>
          </>
        ):(
          !match.done&&<div style={{textAlign:'center',padding:'12px 0',fontSize:13,color:'var(--red)',fontWeight:600}}>
            {started||match.live?'🔒 El partido ya empezó · no se puede cambiar.':'🔒 Predicciones cerradas.'}
          </div>
        )}
        {ex&&(
          <div className="pres-box" style={{marginTop:10}}>
            <div style={{fontSize:10,color:'var(--mut)',marginBottom:4}}>TU PREDICCIÓN</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:'var(--gld)'}}>{ex.h} – {ex.a}</div>
            {match.done&&(()=>{
              const mr=res.find(r=>r.uid===user.id);
              if(mr)return<div style={{marginTop:6,fontSize:12,color:'var(--grn)'}}>{mr.exact?'⭐ ':''} Posición #{mr.rank} · +{mr.pts} pts{mr.exact?' (¡Exacto!)':''}</div>;
              return<div style={{marginTop:6,fontSize:12,color:'var(--mut)'}}>No ganaste puntos en este partido.</div>;
            })()}
            {ex.history&&ex.history.length>0&&(
              <div style={{marginTop:10}}>
                <div style={{fontSize:10,color:'var(--mut)',fontWeight:700,marginBottom:6}}>HISTORIAL</div>
                {ex.history.map((h,i)=>(
                  <div key={i} className="hist-item"><span style={{fontFamily:"'DM Mono',monospace"}}>{h.h} – {h.a}</span><span>{fmt(h.ts)}</span></div>
                ))}
              </div>
            )}
          </div>
        )}
        {!revealed&&matchPreds.length>0&&(
          <div className="secretbox">
            🤫 {matchPreds.length} predicci{matchPreds.length===1?'ón':'ones'} guardada{matchPreds.length===1?'':'s'} en secreto.<br/>Se revelan cuando arranque el partido.
          </div>
        )}
      </div>
      {revealed&&!match.done&&matchPreds.length>0&&(
        <div style={{marginTop:4}}>
          <div className="stit">PREDICCIONES REVELADAS 👀</div>
          {matchPreds.map(p=>{
            const u=getU(p.uid);
            return(
              <div key={p.uid} className={`rkrow ${p.uid===user.id?'me':''}`}>
                <span style={{fontSize:18}}>{u.avatar||'⚽'}</span>
                <div style={{flex:1,fontWeight:600,fontSize:13}}>{u.name}{p.uid===user.id?' ← tú':''}</div>

      {match.done&&res.length>0&&(
        <div style={{marginTop:4}}>
          <div className="stit">RESULTADOS</div>
          {res.map(r=>{
            const medals=['🥇','🥈','🥉'];
            const u=getU(r.uid);
            const pred=matchPreds.find(p=>p.uid===r.uid);
            return(
              <div key={r.uid} className={`rkrow ${r.uid===user.id?'me':''}`}>
                <span style={{fontSize:18}}>{medals[r.rank-1]||'•'}</span>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{(u.avatar||'⚽')+' '+u.name}</div><div style={{fontSize:11,color:'var(--mut)'}}>Pred: {pred?.h}–{pred?.a} · Dif: {r.dist}{r.exact?' ⭐':''}</div></div>
                <div style={{textAlign:'center'}}><div className="rkp">+{r.pts}</div><div style={{fontSize:9,color:'var(--mut)'}}>pts</div></div>
              </div>
            );
          })}
          {unscored.map(p=>{
            const u=getU(p.uid);
            return(
              <div key={p.uid} className={`rkrow ${p.uid===user.id?'me':''}`}>
                <span style={{fontSize:18,color:'var(--mut)'}}>—</span>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{(u.avatar||'⚽')+' '+u.name}</div><div style={{fontSize:11,color:'var(--mut)'}}>Pred: {p.h}–{p.a}</div></div>
                <div style={{fontSize:12,color:'var(--mut)'}}>0 pts</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function RankingView({users,totals,byMatch,user,matches,preds}){
  const ranked=[...users].map(u=>({...u,pts:totals[u.id]||0})).sort((a,b)=>b.pts-a.pts);

  const myResults=Object.values(byMatch).flat().filter(r=>r.uid===user.id);
  const exactos=myResults.filter(r=>r.exact).length;
  const podios=myResults.length;
  const avgDist=myResults.length>0?(myResults.reduce((s,r)=>s+r.dist,0)/myResults.length).toFixed(1):'—';

  const shareWA=()=>{
    let txt='🏆 POLLA FAMILIAR 2026 · Familia Toro\n\n';
    ranked.forEach((u,i)=>{txt+=`${i<3?medals[i]:(i+1)+'.'} ${u.avatar||'⚽'} ${u.name}: ${u.pts} pts\n`;});
    txt+=`\n${doneCount} partido${doneCount!==1?'s':''} jugado${doneCount!==1?'s':''} ⚽`;
    window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');

  return(
    <div>
      {user.id!=='admin'&&(
        <>
          <div className="stit">MIS ESTADÍSTICAS 📈</div>

            <div className="statbox"><div className="statn">{totals[user.id]||0}</div><div className="statl">Puntos totales</div></div>
            <div className="statbox"><div className="statn">{exactos}</div><div className="statl">⭐ Exactos</div></div>
            <div className="statbox"><div className="statn">{podios}</div><div className="statl">Podios</div></div>
            <div className="statbox"><div className="statn">{avgDist}</div><div className="statl">Dif. promedio</div></div>
          </div>
        </>
      )}
      <div className="stit">TABLA DE POSICIONES</div>
      <div className="ssub">{doneCount>0?`${doneCount} partido${doneCount>1?'s':''} finalizado${doneCount>1?'s':''}.`:'Los puntos aparecen cuando terminen los partidos.'}</div>
      {ranked.length===0?<div className="empty"><div className="eico">🏆</div><div className="etxt">Nadie registrado aún.</div></div>
        :<>
          {ranked.map((u,i)=>(
            <div key={u.id} className={`rkrow ${u.id===user.id?'me':''}`}>
              <span className={`rkn ${rc[Math.min(i,3)]}`}>{i<3?medals[i]:i+1}</span>
              <span style={{fontSize:18}}>{u.avatar||'⚽'}</span>
              <div className="rknm">{u.name}{u.id===user.id&&<span style={{marginLeft:6,fontSize:9,color:'var(--gld)'}}>← tú</span>}</div>
              <div style={{textAlign:'center'}}><div className="rkp">{u.pts}</div><div style={{fontSize:9,color:'var(--mut)'}}>pts</div></div>
            </div>
          ))}
          <button className="btn btw" style={{marginTop:8}} onClick={shareWA}>📤 Compartir ranking por WhatsApp</button>
        </>
      }
      <div style={{marginTop:18}}>
        <div className="stit">PUNTOS</div>
        <div className="card" style={{fontSize:12,color:'var(--mut)',lineHeight:2.2}}>
          {[['🥇 Marcador exacto','3 pts'],['🥈 Más cercano','2 pts'],['🥉 Segundo más cercano','1 pt']].map(([l,p])=>(
            <div key={l}>{l}: <strong style={{color:'var(--txt)'}}>{p}</strong></div>
          ))}
        </div>
      </div>
    </div>
  );
}

          {dups.map((group,i)=>(
            <div key={i} style={{background:'rgba(206,17,38,.06)',border:'1px solid rgba(206,17,38,.2)',borderRadius:8,padding:10,marginBottom:8}}>
              <div style={{fontSize:11,color:'var(--red)',marginBottom:6,fontWeight:700}}>"{group[0].name}"</div>
              {group.map(u=>(
                <div key={u.id} className="arow">
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{(u.avatar||'⚽')+' '+u.name}</div><div style={{fontSize:11,color:'var(--mut)'}}>{preds.filter(p=>p.uid===u.id).length} predicciones</div></div>
                  <button className="btn btd btsm" style={{padding:'4px 10px'}} onClick={()=>ops.deleteUser(u.id)}>Eliminar</button>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
      {users.length>0&&(
        <div className="asec">
          <div className="asect">Participantes ({users.length})</div>
          {users.map(u=>(
            <div key={u.id} className="arow">
              <div style={{flex:1,fontSize:13,fontWeight:600}}>{(u.avatar||'⚽')+' '+u.name}</div>
              <button className="btn btd btsm" style={{padding:'4px 10px'}} onClick={()=>ops.deleteUser(u.id)}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App(){
  const[view,setView]=useState('login');
  const[user,setUser]=useState(null);
  const[isAdmin,setIsAdmin]=useState(false);
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const[selMatch,setSelMatch]=useState(null);
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem('pt26theme')||'dark';}catch{return'dark';}});
  const[data,setData]=useState({users:[],matches:[],preds:[],config:{open:true}});
  const[,forceTick]=useState(0);
  const prevOpen=useRef(null);
  const userRef=useRef(null);

  const showToast=(msg,dur=3000)=>{setToast(msg);setTimeout(()=>setToast(null),dur);};

  useEffect(()=>{
    try{localStorage.setItem('pt26theme',theme);}catch{}
    document.body.style.background=theme==='light'?'#f0f4f8':'#060e1c';
  },[theme]);

  useEffect(()=>{const t=setInterval(()=>forceTick(x=>x+1),30000);return()=>clearInterval(t);},[]);

  useEffect(()=>{
    const r=db.ref('pt26v2');
    const handler=snap=>{
      const v=snap.val()||{};
      setData({
        matches:v.matches?Object.values(v.matches):[],
        preds:  v.preds  ?Object.values(v.preds)  :[],
        users:  v.users  ?Object.values(v.users)  :[],
        config: v.config ||{open:true}
      });
      setLoading(false);
    };
    r.on('value',handler);
    return()=>r.off('value',handler);
  },[]);

  useEffect(()=>{
    if(prevOpen.current!==null&&prevOpen.current!==data.config.open&&userRef.current){
      showToast(data.config.open?'✅ ¡Predicciones abiertas!':'🔒 Predicciones cerradas.',4000);
    }
    prevOpen.current=data.config.open;
  },[data.config.open]);

  const ops={
    addMatch:   m =>fbSet(`matches/${m.id}`,m),
    updateMatch:m =>fbSet(`matches/${m.id}`,m),
    deleteMatch:id=>fbRemove(`matches/${id}`),
    addUser:    u =>fbSet(`users/${u.id}`,u),
    deleteUser: id=>Promise.all([fbRemove(`users/${id}`),db.ref('pt26v2/preds').orderByChild('uid').equalTo(id).get().then(s=>{if(!s.val())return;const upd={};Object.keys(s.val()).forEach(k=>{upd[k]=null;});return db.ref('pt26v2/preds').update(upd);})]),
    savePred:   p =>fbSet(`preds/${p.id}`,p),
    clearPreds: ()=>fbRemove('preds'),
    saveConfig: c =>fbSet('config',c),
  };

  const{totals,byMatch}=calcScores(data.matches,data.preds);

  const navs=[
    {id:'matches',ico:'⚽',lbl:'Partidos'},
    {id:'ranking',ico:'🏆',lbl:'Ranking'},
    {id:'porpartido',ico:'📊',lbl:'Por Partido'},
    ...(isAdmin?[{id:'admin',ico:'⚙️',lbl:'Admin'}]:[]),
  ];
  const goTo=v=>{setView(v);setSelMatch(null);};
  const CSS=mkCSS(theme==='dark');

  if(loading)return(
    <>
      <style dangerouslySetInnerHTML={{__html:CSS}}/>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
        <div style={{fontSize:56,animation:'bounce 1.2s infinite'}}>⚽</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:'#FCD116',letterSpacing:2}}>Conectando...</div>
      </div>
    </>
  );

  return(
    <>
      <style dangerouslySetInnerHTML={{__html:CSS}}/>
      <div className="wrap">
        {user&&(
          <>
            <div className="hdr">
              <div>
                <div className="hdr-t">⚽ Polla Familiar 2026</div>
                <div className="hdr-s">La tradición de la familia Toro</div>
              </div>
              <div className="hdr-r">
                <button className="thmbtn" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>{theme==='dark'?'☀️':'🌙'}</button>
                <button className="ubub" onClick={()=>{setUser(null);userRef.current=null;setIsAdmin(false);setView('login');}}>{(user.avatar||'⚽')+' '+user.name.split(' ')[0]}</button>
              </div>
              <div className="hdr-bar"/>
            </div>
            <nav className="nav">
              {navs.map(n=>(
                <button key={n.id} className={`ni ${(view===n.id||(view==='predict'&&n.id==='matches'))?'on':''}`} onClick={()=>goTo(n.id)}>
                  <span className="nico">{n.ico}</span>{n.lbl}
                </button>
              ))}
            </nav>
          </>
        )}
        <div className="pg">
          {view==='login'&&(
            <LoginView users={data.users}
              onLogin={u=>{setUser(u);userRef.current=u;setView('matches');}}
              onRegister={async(name,avatar)=>{
                const nu={id:Date.now().toString(),name,avatar};
                await ops.addUser(nu);
                setUser(nu);userRef.current=nu;setView('matches');
                showToast('¡Bienvenido/a '+name+'! 🎉');
              }}
              onAdminLogin={pass=>{
                if(pass===ADMIN_PASS){const u={id:'admin',name:'Albeiro',avatar:'👑'};setUser(u);userRef.current=u;setIsAdmin(true);setView('admin');showToast('¡Bienvenido Albeiro! 👑');}
                else showToast('❌ Contraseña incorrecta');
              }}
            />
          )}
          {(view==='matches'||(view==='predict'&&!selMatch))&&(
            <MatchesView matches={data.matches} preds={data.preds} user={user} config={data.config} onSelect={m=>{setSelMatch(m);setView('predict');}}/>
          )}
          {view==='predict'&&selMatch&&(
            <PredictView match={data.matches.find(m=>m.id===selMatch.id)||selMatch} user={user} preds={data.preds} byMatch={byMatch} users={data.users} config={data.config}
              onSavePred={async(h,a)=>{
                const m=data.matches.find(x=>x.id===selMatch.id);
                if(m&&(hasStarted(m)||m.live||m.done)){showToast('🔒 El partido ya empezó.');return;}
                const now=Date.now();
                const ex=data.preds.find(p=>p.mid===selMatch.id&&p.uid===user.id);
                const id=ex?ex.id:Date.now().toString();
                const hist=ex?[...(ex.history||[]),{h:ex.h,a:ex.a,ts:now}]:[];
                await ops.savePred({id,mid:selMatch.id,uid:user.id,h,a,history:hist});
                showToast('¡Predicción guardada! 🎯');setSelMatch(null);setView('matches');
              }}
              onBack={()=>{setSelMatch(null);setView('matches');}}
            />
          )}
          {view==='ranking'&&<RankingView users={data.users} totals={totals} byMatch={byMatch} user={user} matches={data.matches} preds={data.preds}/>}
          {view==='porpartido'&&<PorPartidoView matches={data.matches} preds={data.preds} users={data.users} byMatch={byMatch} user={user}/>}
          {view==='admin'&&isAdmin&&(
            <AdminView matches={data.matches} users={data.users} config={data.config} preds={data.preds} ops={ops} showToast={showToast}/>
          )}
        </div>
        {toast&&<div className="toast">{toast}</div>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
